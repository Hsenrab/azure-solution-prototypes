name: Notebook Metadata Check

on:
  pull_request:
    paths:
      - "**/*.ipynb"
      - ".pre-commit-config.yaml"
      - ".github/workflows/notebook-metadata-check.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.ipynb"
      - ".pre-commit-config.yaml"
      - ".github/workflows/notebook-metadata-check.yml"

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run notebook metadata checks
        run: pre-commit run --all-files --show-diff-on-failure
